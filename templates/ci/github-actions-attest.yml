# ATTEST — Agent Testing & Trust Evaluation Suite
# GitHub Actions workflow: runs agent tests on every push / PR and posts a
# results summary. Copy this file to .github/workflows/attest.yml in your repo.
#
# Required secrets (Settings -> Secrets and variables -> Actions):
#   AZURE_API_KEY    — key for your Foundry agent + Azure evaluators
#   AZURE_API_BASE   — (optional) Azure OpenAI endpoint for evaluators
#   OPENAI_API_KEY   — (optional) only if using OpenAI for evaluation

name: ATTEST Agent Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # needed to comment results on PRs
  checks: write

jobs:
  agent-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ATTEST
        run: |
          python -m pip install --upgrade pip
          # Install your project (ATTEST + its extras). Adjust as needed:
          pip install -e ".[azure,deepeval,dashboard]"

      - name: Run ATTEST agent tests
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          attest run --parallel 4 --quiet
        # attest exits non-zero if any test fails -> the job fails.

      - name: Publish results to job summary
        if: always()
        run: |
          if [ -f reports/summary.md ]; then
            cat reports/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment results on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: reports/summary.md
          header: attest-results

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attest-reports
          path: reports/

      - name: Publish JUnit test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: reports/junit.xml
          check_name: ATTEST Agent Tests
